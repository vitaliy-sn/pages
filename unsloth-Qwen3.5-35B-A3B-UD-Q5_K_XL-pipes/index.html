<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pipes Screensaver</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }

        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #333; }

        input[type=range] { width: 200px; cursor: pointer; }

        button {
            padding: 8px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        button:hover { background-color: #0056b3; }

        .info { font-size: 10px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div id="ui-container">
    <div class="control-group">
        <label for="speedRange">Generation Speed (Delay in ms)</label>
        <input type="range" id="speedRange" min="10" max="300" value="50" step="10">
    </div>
    <div class="control-group">
        <button id="toggleCamera">Toggle Auto-Rotation</button>
    </div>
    <div class="info">
        Pipes: 5<br>
        Max Meshes: 4000 (Auto-Reset)
    </div>
</div>

<!-- STRICT CDN REQUIREMENTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/geometries/TeapotGeometry.js"></script>

<script>
    // --- Configuration & Globals ---
    const CONFIG = {
        segmentLength: 6,
        maxMeshes: 4000,
        pipeCount: 5,
        bounds: 1200 // Half-width of the playfield
    };

    let scene, camera, renderer, controls;
    let activePipes = [];
    let occupiedPositions = new Set();
    let totalMeshCount = 0;

    // Timing & UI State
    let lastTime = 0;
    let generationDelay = parseInt(document.getElementById('speedRange').value);
    let autoRotateEnabled = false;

    // --- Setup Scene ---
    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera setup to fit the large playfield
        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(60, aspect, 1, 5000);
        camera.position.set(0, 400, 800);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lighting (Full-bright with Specular)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 100);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-100, -100, -100);
        scene.add(pointLight);

        // Controls
        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = false;

        // Initial Pipes
        for (let i = 0; i < CONFIG.pipeCount; i++) {
            spawnPipe();
        }

        window.addEventListener('resize', onWindowResize, false);
        document.getElementById('speedRange').addEventListener('input', (e) => {
            generationDelay = parseInt(e.target.value);
        });
        document.getElementById('toggleCamera').addEventListener('click', () => {
            autoRotateEnabled = !autoRotateEnabled;
            controls.autoRotate = autoRotateEnabled;
        });

        requestAnimationFrame(animate);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- Pipe Class Implementation ---
    class Pipe {
        constructor(id) {
            this.id = id;
            this.active = true;

            // Random Color (HSL)
            const hue = Math.random();
            this.material = new THREE.MeshPhongMaterial({
                color: new THREE.Color().setHSL(hue, 0.8, 0.5),
                specular: 0x444444,
                shininess: 60
            });

            // Start Position (Center)
            this.currentPos = new THREE.Vector3(0, 0, 0);

            // Initial Direction (Random Axis aligned)
            const dirs = [
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1)
            ];
            this.direction = dirs[Math.floor(Math.random() * dirs.length)];

            // Create initial joint (Sphere at 0,0,0)
            const sphereGeo = new THREE.SphereGeometry(2.5, 16, 16);
            const mesh = new THREE.Mesh(sphereGeo, this.material);
            mesh.position.copy(this.currentPos);
            scene.add(mesh);
            totalMeshCount++;

            // Claim starting position
            occupiedPositions.add("0,0,0");
        }

        step() {
            if (!this.active) return;

            // 1. Generate directions to test (Shuffle standard X, Y, Z vectors)
            let possibleDirs = [
                new THREE.Vector3(1, 0, 0),
                new THREE.Vector3(-1, 0, 0),
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0, -1, 0),
                new THREE.Vector3(0, 0, 1),
                new THREE.Vector3(0, 0, -1)
            ];

            // Fisher-Yates Shuffle
            for (let i = possibleDirs.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [possibleDirs[i], possibleDirs[j]] = [possibleDirs[j], possibleDirs[i]];
            }

            // 2. Find valid nextPos
            let nextPos = null;
            let chosenDir = null;

            for (let dir of possibleDirs) {
                // CRITICAL: Use exact math instructions
                let testPos = this.currentPos.clone().add(dir.clone().multiplyScalar(CONFIG.segmentLength));

                // Stringify testPos
                const strTestPos = `${testPos.x},${testPos.y},${testPos.z}`;

                // Check bounds and occupied
                const isOutOfBounds = Math.abs(testPos.x) > CONFIG.bounds ||
                                      Math.abs(testPos.y) > CONFIG.bounds ||
                                      Math.abs(testPos.z) > CONFIG.bounds;

                const isOccupied = occupiedPositions.has(strTestPos);

                if (!isOutOfBounds && !isOccupied) {
                    nextPos = testPos;
                    chosenDir = dir;
                    break; // Found first valid direction
                }
            }

            // 3. If no valid directions, die
            if (nextPos === null) {
                this.active = false;
                return;
            }

            // 4. Calculate Midpoint for Cylinder
            let midPoint = this.currentPos.clone().add(nextPos).multiplyScalar(0.5);

            // 5. Draw Cylinder at midPoint
            const cylinderGeo = new THREE.CylinderGeometry(2, 2, CONFIG.segmentLength, 16);
            const cylinderMesh = new THREE.Mesh(cylinderGeo, this.material);

            cylinderMesh.position.copy(midPoint);

            // Rotate using exact instruction: quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), this.direction)
            cylinderMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), chosenDir);

            scene.add(cylinderMesh);
            totalMeshCount++;

            // 6. Draw Joint (Sphere or Teapot) at nextPos
            const radius = 2.5;
            let jointMesh;

            // 0.1% chance for teapot
            if (Math.random() < 0.001) {
                // Teapot Geometry
                jointMesh = new THREE.Mesh(
                    new THREE.TeapotGeometry(radius * 2.5, 10),
                    this.material
                );

                // Align Spout using exact instruction: quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), this.direction)
                jointMesh.quaternion.setFromUnitVectors(new THREE.Vector3(1, 0, 0), chosenDir);
            } else {
                // Sphere Geometry
                jointMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(radius, 16, 16),
                    this.material
                );
            }

            jointMesh.position.copy(nextPos);
            scene.add(jointMesh);
            totalMeshCount++;

            // 7. CRITICAL COLLISION FIX: Claim Space
            // Add BOTH the stringified nextPos AND the stringified midPoint to occupiedPositions
            const strNextPos = `${nextPos.x},${nextPos.y},${nextPos.z}`;
            const strMidPoint = `${midPoint.x},${midPoint.y},${midPoint.z}`;

            occupiedPositions.add(strNextPos);
            occupiedPositions.add(strMidPoint);

            // 8. Update position
            this.currentPos.copy(nextPos);
            this.direction = chosenDir;
        }
    }

    function spawnPipe() {
        const id = activePipes.length;
        const pipe = new Pipe(id);
        activePipes.push(pipe);
    }

    function resetScene() {
        // Wipe scene completely
        while(scene.children.length > 0){
            scene.remove(scene.children[0]);
        }

        // Re-add lights (since we wiped everything)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 100);
        scene.add(dirLight);
        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-100, -100, -100);
        scene.add(pointLight);

        // Clear data structures
        occupiedPositions.clear();
        totalMeshCount = 0;

        // Reset Camera Position
        camera.position.set(0, 400, 800);
        controls.target.set(0,0,0);
        controls.update();

        // Spawn new pipes
        activePipes = [];
        for (let i = 0; i < CONFIG.pipeCount; i++) {
            spawnPipe();
        }
    }

    // --- Main Loop ---
    function animate(time) {
        requestAnimationFrame(animate);

        // 1. Timing Check
        if (time - lastTime >= generationDelay) {
            lastTime = time;

            // CRITICAL: Use forEach loop to call .step() on ALL active pipes simultaneously
            activePipes.forEach(pipe => pipe.step());

            // Remove dead pipes from active list, but DO NOT remove meshes from scene.
            const initialCount = activePipes.length;
            activePipes = activePipes.filter(p => p.active);

            // If a pipe died, spawn a new one to keep count at 5
            if (activePipes.length < initialCount) {
                spawnPipe();
            }

            // 2. Scene Management Check (Wipe Logic)
            // Must happen AFTER pipes stepped
            if (totalMeshCount > CONFIG.maxMeshes) {
                resetScene();
            }
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Start
    init();

</script>
</body>
</html>
